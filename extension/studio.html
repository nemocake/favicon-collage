<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Favicon Collage — studio</title>
  <link rel="stylesheet" href="studio.css">
</head>
<body>
  <div class="grain"></div>
  <div class="app">

    <header class="topbar">
      <div class="wordmark">Favicon Collage <span class="sub">browsing as artifact</span></div>
      <div class="priv">local only · <b>nothing uploaded</b></div>
    </header>

    <div class="progress"><span id="progress-bar"></span></div>

    <main class="layout">
      <aside class="index" id="sidebar" hidden>
        <div class="index-head">
          <span id="sites-count">Index</span>
          <button id="side-collapse" title="Hide index">‹</button>
        </div>
        <input id="site-search" type="search" placeholder="filter sites…">
        <div class="bulk">
          <button data-bulk="all">All</button>
          <button data-bulk="none">None</button>
          <button data-bulk="invert">Invert</button>
        </div>
        <div class="site-list" id="site-list"></div>
      </aside>

      <section class="stage" id="stage">
        <button id="side-reopen" hidden>Index ›</button>
        <div class="rendertoggle" id="rendertoggle" hidden>
          <button data-render="fav" class="on">Favicons</button>
          <button data-render="col">Colour</button>
        </div>
        <div class="viewport" id="viewport">
          <div class="frame" id="frame">
            <div class="empty" id="empty">
              <h2>An empty wall</h2>
              <p>Choose a period below and press <b>Generate</b> to weave your
              history into a collage — or <b>Try demo</b> to see the forms first.</p>
            </div>
            <canvas id="canvas" style="display:none"></canvas>
          </div>
          <div class="zoombar" id="zoombar" hidden>
            <button id="zfit" title="Fit to view">Fit</button>
            <input id="zoom" type="range" min="0.05" max="8" step="0.01" value="1"
                   title="Zoom (scroll over the artwork, or drag to pan)">
            <span id="zpct">100%</span>
          </div>
        </div>
        <figcaption class="label" id="label" hidden>
          <div class="label-title" id="cap-title">—</div>
          <div class="label-meta" id="cap-meta"></div>
        </figcaption>
      </section>
    </main>

    <footer class="console">
      <div class="grp">
        <div class="field">
          <label for="timeframe">Period</label>
          <select id="timeframe">
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90" selected>Last 90 days</option>
            <option value="180">Last 6 months</option>
            <option value="365">Last year</option>
            <option value="0">All history</option>
          </select>
        </div>
        <div class="field">
          <label for="mode">Form</label>
          <select id="mode"></select>
        </div>
        <div class="field tiny">
          <label for="maxtiles">Cap</label>
          <select id="maxtiles">
            <option value="1000">1k</option>
            <option value="3000" selected>3k</option>
            <option value="6000">6k</option>
            <option value="20000">none</option>
          </select>
        </div>
      </div>
      <div class="grp right">
        <span id="status"></span>
        <button id="demo" class="btn">Try demo</button>
        <button id="save" class="btn" disabled>Save PNG</button>
        <button id="generate" class="btn primary">Generate</button>
      </div>
    </footer>

  </div>

  <script src="renderers.js"></script>
  <script src="studio.js"></script>
</body>
</html>
